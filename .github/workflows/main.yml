name: Run Cypress Tests Manually

on:
  workflow_dispatch:
    inputs:
      cypress_user:
        description: 'Inserisci lo username per SauceDemo'
        required: true
        default: 'standard_user'
        type: string
      cypress_password:
        description: 'Inserisci la password per SauceDemo'
        required: true
        default: 'secret_sauce'
        type: string

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    
    # Definiamo la cartella di lavoro corretta per TUTTI i comandi successivi
    defaults:
      run:
        working-directory: './[]Cypress'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Usiamo Node 16 per evitare il crash del flag --loader/--import di tsx
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 16
          cache: 'npm'
          cache-dependency-path: './[]Cypress/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Run Cypress Tests
        run: npx cypress run --spec "cypress/e2e/1_6_login_visual_user_checkout-step-two.cy.js"
        env:
          CYPRESS_CYPRESS_USER: ${{ github.event.inputs.cypress_user }}
          CYPRESS_CYPRESS_PASSWORD: ${{ github.event.inputs.cypress_password }}

      # Salviamo i video così potrai scaricarli e vederli visivamente
      - name: Upload Cypress Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-results
          path: |
            ./[]Cypress/cypress/screenshots
            ./[]Cypress/cypress/videos
